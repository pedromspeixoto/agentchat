# Claude Hello World Agent
name: Claude Hello World Agent
description: A simple agent that demonstrates basic Claude Agent SDK capabilities
purpose: Demonstrate a basic agent with a Claude workflow and skill.

# Docker registry URL for prebuilt image
image: docker.io/pedropeixoto6/mobox-claude-hello-world:v1.0.3

# Entrypoint - command to execute in the sandbox
entrypoint: ["python", "/app/run_agent.py"]

# Environment variables this agent needs (values come from server env)
# Option A – Direct Anthropic: only ANTHROPIC_API_KEY is needed.
# Option B – Azure AI Foundry: CLAUDE_CODE_USE_FOUNDRY + ANTHROPIC_FOUNDRY_* vars.
env_vars:
  - ANTHROPIC_API_KEY
  - CLAUDE_CODE_USE_FOUNDRY
  - ANTHROPIC_FOUNDRY_BASE_URL
  - ANTHROPIC_FOUNDRY_API_KEY
  - ANTHROPIC_DEFAULT_HAIKU_MODEL
  - ANTHROPIC_DEFAULT_SONNET_MODEL
  - ANTHROPIC_DEFAULT_OPUS_MODEL

# Sandbox lifecycle settings
timeout: 600        # 10 min max lifetime
idle_timeout: 120   # 2 min idle before termination
